<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI見積もり自動生成デモ - 早川まい</title>
<style>

  body {
    font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;

    overflow-x: hidden;

  /* Particle Background */
  canvas#particles { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }

  .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

  /* Header */
  .header {
    text-align: center; padding: 60px 0 40px;
  }
  .badge {
    display: inline-block; padding: 6px 20px; border-radius: 50px; font-size: 12px;
    background: rgba(96,165,250,0.1); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3);
    margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase;
  }
  .header h1 {
    font-size: 48px; font-weight: 800; line-height: 1.2; margin-bottom: 16px;
    background: linear-gradient(135deg, #60a5fa 0%, #c084fc 50%, #f472b6 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header p { font-size: 18px; color: #64748b; max-width: 600px; margin: 0 auto; }

  /* Main Layout */
  .main { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 40px; }

  /* Input Panel */
  .panel {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px; padding: 36px; backdrop-filter: blur(10px);

    font-size: 20px; font-weight: 700; margin-bottom: 24px; color: #e2e8f0;

  .panel h2 .dot { width: 8px; height: 8px; border-radius: 50%; background: #34d399; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 8px; font-weight: 500; }
  select, input[type="text"], textarea {
    width: 100%; padding: 14px 16px; border-radius: 12px; font-size: 15px;

  .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .checkbox-item {
    padding: 10px 18px; border-radius: 50px; font-size: 13px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02);

  .checkbox-item.selected {

  .generate-btn {
    width: 100%; padding: 16px; border-radius: 12px; border: none; cursor: pointer;

    background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
    background-size: 200% 200%; animation: gradientMove 3s ease infinite;
    transition: transform 0.2s, box-shadow 0.3s;

  .generate-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(96,165,250,0.3);
  }
  .generate-btn:active { transform: translateY(0); }
  @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  /* Output Panel */
  .output-panel {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px; padding: 36px; backdrop-filter: blur(10px);
    position: relative; overflow: hidden;
  }
  .output-panel::before {
    content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 3px;

  .typing-cursor { display: inline-block; width: 2px; height: 1em; background: #60a5fa; animation: blink 0.8s infinite; vertical-align: text-bottom; margin-left: 2px; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* Generated Content */
  .gen-section { margin-bottom: 24px; opacity: 0; transform: translateY(10px); transition: all 0.5s; }
  .gen-section.visible { opacity: 1; transform: translateY(0); }
  .gen-section h3 { font-size: 14px; color: #60a5fa; font-weight: 600; margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }

  .quote-table { width: 100%; border-collapse: collapse; }
  .quote-table th, .quote-table td {
    padding: 12px 16px; text-align: left; font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .quote-table th { color: #64748b; font-weight: 500; font-size: 12px; }
  .quote-table td { color: #cbd5e1; }
  .quote-table .price { text-align: right; font-weight: 700; color: #60a5fa; font-variant-numeric: tabular-nums; }
  .quote-table .total-row td { border-top: 2px solid rgba(96,165,250,0.3); font-weight: 700; font-size: 16px; }
  .quote-table .total-row .price { color: #34d399; font-size: 20px; }

  .timeline-mini { display: flex; gap: 8px; flex-wrap: wrap; }
  .tl-step {
    flex: 1; min-width: 100px; padding: 14px; border-radius: 12px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
    text-align: center; position: relative;
  }
  .tl-step .week { font-size: 11px; color: #64748b; margin-bottom: 4px; }
  .tl-step .task { font-size: 13px; color: #cbd5e1; font-weight: 600; }

  .risk-item {

  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

  .empty-state { text-align: center; padding: 80px 20px; color: #475569; }

  .speed-badge {

    border-radius: 50px; font-size: 12px; margin-top: 16px;

  }

<div class="container">

  </div>

<script>
// Particle Background
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

const particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
    size: Math.random() * 2 + 0.5, alpha: Math.random() * 0.3 + 0.1
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach((p, i) => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(96,165,250,${p.alpha})`;
    ctx.fill();
    // Connect nearby particles
    particles.slice(i + 1).forEach(p2 => {
      const dx = p.x - p2.x, dy = p.y - p2.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = `rgba(96,165,250,${0.06 * (1 - dist/120)})`;
        ctx.stroke();
      }
    });
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

// Feature Toggle
function toggleFeature(el) {
  el.classList.toggle('selected');
}

// Quote Generation
function generateQuote() {
  const type = document.getElementById('projectType').value;
  const industry = document.getElementById('industry').value || '一般企業';
  const requirements = document.getElementById('requirements').value || '業務効率化';
  const budget = document.getElementById('budget').value;
  const features = [...document.querySelectorAll('.checkbox-item.selected')].map(el => el.dataset.feature);

  const output = document.getElementById('output-content');

  // Show loading
  output.innerHTML = `
    <div class="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <span style="font-size:14px; color:#94a3b8;">AIが見積もりを生成中...</span>
    </div>
  `;

  const startTime = Date.now();

  // Simulate AI generation with staggered reveals
  setTimeout(() => {
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    const quote = buildQuote(type, industry, requirements, budget, features);

    output.innerHTML = `
      <div class="speed-badge">⚡ ${elapsed}秒で生成完了</div>

      <div class="gen-section" id="sec-summary">
        <h3>📋 案件概要</h3>
        <div style="background:rgba(255,255,255,0.02); border-radius:12px; padding:20px; border:1px solid rgba(255,255,255,0.04);">
          <div style="font-size:16px; font-weight:700; color:#e2e8f0; margin-bottom:8px;">${quote.title}</div>
          <div style="font-size:14px; color:#94a3b8; line-height:1.7;">${quote.summary}</div>
        </div>
      </div>

      <div class="gen-section" id="sec-quote">
        <h3>💰 見積もり内訳</h3>
        <table class="quote-table">
          <tr><th>項目</th><th>内容</th><th style="text-align:right;">金額</th></tr>
          ${quote.items.map(item => `
            <tr><td>${item.name}</td><td style="color:#64748b; font-size:13px;">${item.desc}</td><td class="price">¥${item.price.toLocaleString()}</td></tr>
          `).join('')}
          <tr class="total-row"><td colspan="2">合計（税別）</td><td class="price">¥${quote.total.toLocaleString()}</td></tr>
        </table>
      </div>

      <div class="gen-section" id="sec-schedule">
        <h3>📅 スケジュール</h3>
        <div class="timeline-mini">
          ${quote.schedule.map(s => `
            <div class="tl-step">
              <div class="week">${s.week}</div>
              <div class="task">${s.task}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="gen-section" id="sec-risk">
        <h3>⚠️ リスク分析</h3>
        ${quote.risks.map(r => `
          <div class="risk-item">
            <span class="risk-badge risk-${r.level}">${r.level === 'high' ? '高' : r.level === 'mid' ? '中' : '低'}</span>
            <div>
              <div style="font-size:14px; color:#cbd5e1; font-weight:600;">${r.title}</div>
              <div style="font-size:13px; color:#64748b; margin-top:4px;">${r.mitigation}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="gen-section" id="sec-guarantee">
        <div style="background:rgba(52,211,153,0.05); border:1px solid rgba(52,211,153,0.2); border-radius:12px; padding:20px; text-align:center;">
          <div style="font-size:24px; margin-bottom:8px;">🛡️</div>
          <div style="font-size:16px; font-weight:700; color:#34d399; margin-bottom:6px;">全額返金保証付き</div>
          <div style="font-size:13px; color:#64748b;">ご満足いただけない場合は全額返金いたします</div>
        </div>
      </div>
    `;

    // Staggered reveal
    const sections = ['sec-summary', 'sec-quote', 'sec-schedule', 'sec-risk', 'sec-guarantee'];
    sections.forEach((id, i) => {
      setTimeout(() => {
        document.getElementById(id)?.classList.add('visible');
      }, i * 400);
    });

  }, 2000);
}

  const configs = {
