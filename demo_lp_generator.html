.fg select option{background:#141414}
.fg textarea{min-height:36px;resize:none}

}
}

}

.sec-head{text-align:center;margin-bottom:56px;position:relative;z-index:1}
.sec-head .en-label{font-family:'EB Garamond',serif;font-size:12px;font-weight:600;color:${g};letter-spacing:5px;text-transform:uppercase;margin-bottom:10px;display:block}
.sec-head .div-line{width:60px;height:1px;background:${g};margin:0 auto 16px;position:relative}
.sec-head .div-line::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:${g};border-radius:50%}
.sec-head h2{font-family:'Noto Serif JP',serif;font-size:30px;font-weight:700;color:#1a1a1a;line-height:1.65;letter-spacing:3px}

/* ── Sticky Nav ── */
.lp-nav{position:fixed;top:0;left:0;right:0;z-index:9999;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;transition:all .4s;background:rgba(250,248,245,0);border-bottom:1px solid transparent}
.lp-nav.scrolled{background:rgba(250,248,245,.97);backdrop-filter:blur(20px);border-bottom-color:#ece8e1;box-shadow:0 1px 20px rgba(0,0,0,.04)}
.lp-nav .nav-brand{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:3px;transition:color .4s}
.lp-nav.scrolled .nav-brand{color:#1a1a1a}
.lp-nav .nav-right{display:flex;align-items:center;gap:12px}
.lp-nav .nav-tel{font-size:13px;color:#fff;letter-spacing:1px;font-weight:600;transition:color .4s;text-decoration:none}
.lp-nav.scrolled .nav-tel{color:#333}
.lp-nav .nav-cta{padding:9px 22px;background:${ctaC};color:#fff;border:none;border-radius:30px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:'Noto Sans JP',sans-serif;box-shadow:0 2px 8px ${ca(ctaC,.3)};transition:all .3s}
.lp-nav .nav-cta:hover{transform:translateY(-1px);box-shadow:0 4px 16px ${ca(ctaC,.4)}}

/* ── Hero ── */
.hero{position:relative;min-height:100vh;overflow:hidden;display:flex;align-items:center}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(10,10,10,.78) 0%,rgba(10,10,10,.55) 40%,rgba(10,10,10,.72) 100%)}
.hero-fade{position:absolute;bottom:0;left:0;right:0;height:160px;background:linear-gradient(to top,#faf8f5,transparent);z-index:3}

/* Location ribbon */
.loc-ribbon{position:absolute;top:80px;left:0;z-index:5;background:${ca(c,.9)};color:#fff;padding:8px 28px 8px 20px;font-size:12px;font-weight:600;letter-spacing:1px;clip-path:polygon(0 0,100% 0,calc(100% - 12px) 50%,100% 100%,0 100%)}

.hero-content{position:relative;z-index:4;padding:0 60px;max-width:800px}
.hero-brand-label{display:inline-block;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:7px 20px;font-size:11px;font-weight:500;letter-spacing:5px;font-family:'EB Garamond',serif;margin-bottom:24px;opacity:0;animation:fadeUpIn .8s .3s forwards}

/* Jump ratio headline */
.hero-kw-wrap{margin-bottom:20px;opacity:0;animation:fadeUpIn .8s .5s forwards}
.hero-kw-pre{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:500;color:rgba(255,255,255,.85);letter-spacing:3px;display:block;line-height:1.6}
.hero-kw{font-family:'Noto Serif JP',serif;font-size:88px;font-weight:900;color:#fff;letter-spacing:8px;line-height:1.2;text-shadow:0 4px 40px rgba(0,0,0,.4);display:block}
.hero-kw-suf{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:500;color:rgba(255,255,255,.85);letter-spacing:3px;display:block;line-height:1.6}

.hero-sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:28px;letter-spacing:2px;opacity:0;animation:fadeUpIn .8s .7s forwards}

/* Gold badges in FV */
.hero-badges{display:flex;gap:14px;margin-bottom:32px;opacity:0;animation:fadeUpIn .8s .8s forwards}
.gold-badge{width:80px;height:80px;border-radius:50%;border:2px solid ${g};display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;font-weight:700;color:#fff;letter-spacing:.5px;background:${ca(g,.15)};backdrop-filter:blur(8px);line-height:1.3;padding:8px}

.hero-cta-wrap{opacity:0;animation:fadeUpIn .8s 1s forwards}
.hero-cta-btn{display:inline-block;padding:20px 52px;background:${ctaC};color:#fff;border-radius:60px;font-size:16px;font-weight:700;text-decoration:none;box-shadow:0 8px 32px ${ca(ctaC,.4)};animation:pulse3 2.5s infinite;cursor:pointer;border:none;letter-spacing:2px;font-family:'Noto Sans JP',sans-serif;position:relative;overflow:hidden;transition:all .3s}
.hero-cta-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);animation:shimmerBtn 3s infinite}
.hero-cta-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 14px 48px ${ca(ctaC,.5)}}
.hero-note{margin-top:14px;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px;opacity:0;animation:fadeUpIn .8s 1.2s forwards}

.scroll-ind{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);z-index:5;text-align:center;opacity:0;animation:fadeUpIn 1s 1.5s forwards}
.scroll-ind span{display:block;font-family:'EB Garamond',serif;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:4px;margin-bottom:8px}
.scroll-ind svg{animation:bounceChevron 1.8s ease infinite}

/* ── Stats ── */
.stats{background:#fff;padding:48px 24px;border-bottom:1px solid #ece8e1}
.stats-grid{max-width:720px;margin:0 auto;display:flex;justify-content:space-around;text-align:center}
.stat-num{font-family:'Inter',sans-serif;font-size:48px;font-weight:900;color:${c};line-height:1;letter-spacing:-2px}
.stat-unit{font-size:13px;font-weight:600;color:#999;margin-left:2px}
.stat-label{font-size:10px;color:#bbb;margin-top:6px;font-weight:500;letter-spacing:2px}

/* ── Sections ── */
.sec-pad{padding:120px 24px;position:relative;overflow:hidden}
.bg-warm{background:#faf8f5}
.bg-alt{background:#f5f0ea}
.bg-white{background:#fff}

/* ── Worry (speech bubbles) ── */
.worry-bg{background:linear-gradient(135deg,#2a2a2a,#1a1a1a);color:#fff;padding:120px 24px;position:relative;overflow:hidden}
.bubble{background:#fff;color:#444;border-radius:20px;padding:20px 24px;position:relative;display:inline-block;font-size:14px;font-weight:500;line-height:1.6;box-shadow:0 4px 16px rgba(0,0,0,.08);max-width:320px}
.bubble::after{content:'';position:absolute;bottom:-10px;left:30px;width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:12px solid #fff}
.bubble-grid{max-width:680px;margin:0 auto;display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.bubble-item{transform:rotate(-1deg)}
.bubble-item:nth-child(2){transform:rotate(1deg) translateY(12px)}
.bubble-item:nth-child(3){transform:rotate(-0.5deg) translateY(-8px)}
.bubble-item:nth-child(4){transform:rotate(0.8deg) translateY(6px)}

/* Solution with vertical text */
.solution-wrap{text-align:center;margin-top:56px;position:relative}
.vert-text{writing-mode:vertical-rl;font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:4px;line-height:2;display:inline-block;margin:0 auto 24px;padding:16px}

/* ── Features ── */
.feat-block{display:flex;gap:40px;align-items:center;margin-bottom:80px}
.feat-block:last-child{margin-bottom:0}
.feat-block.rev{flex-direction:row-reverse}
.feat-num-bg{position:absolute;top:-20px;font-family:'Inter',sans-serif;font-size:120px;font-weight:900;color:rgba(0,0,0,.025);line-height:1;pointer-events:none}
.feat-info{flex:1;position:relative;z-index:1}
.feat-label{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.feat-label span:first-child{font-family:'Inter',sans-serif;font-size:14px;font-weight:700;color:${g};letter-spacing:3px}
.feat-label .label-line{width:36px;height:1px;background:${g}}
.feat-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:12px;line-height:1.6;letter-spacing:1px}
.feat-desc{font-size:14px;color:#777;line-height:2.1}
.feat-img{flex:0 0 280px;border-radius:20px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.1)}
.feat-img img{width:100%;height:210px;object-fit:cover;display:block;transition:transform .6s}
.feat-img:hover img{transform:scale(1.05)}

/* ── Voices ── */
.voice-card{background:#fff;border-radius:24px;padding:32px 36px 28px;box-shadow:0 4px 24px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.04);margin-bottom:28px;position:relative}
.voice-tri{position:absolute;bottom:-14px;left:52px;width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:14px solid #fff}
.voice-stars{color:#fbbf24;font-size:13px;letter-spacing:4px;margin-bottom:12px}
.voice-text{font-size:14px;color:#444;line-height:2.1}
.voice-profile{display:flex;align-items:center;gap:14px;margin-top:20px;padding-left:24px}
.voice-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:#fff}
.voice-name{font-size:13px;font-weight:600;color:#1a1a1a}
.voice-title-t{font-size:11px;color:#aaa;margin-top:2px}

/* ── Flow ── */
.flow-timeline{max-width:700px;margin:0 auto;display:flex;justify-content:space-between;position:relative}
.flow-timeline::before{content:'';position:absolute;top:30px;left:60px;right:60px;height:2px;background:linear-gradient(90deg,${ca(c,.15)},${ca(g,.3)},${ca(c,.15)})}
.flow-step{text-align:center;position:relative;z-index:1;flex:1}
.flow-circle{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Inter',sans-serif;font-size:16px;font-weight:800}
.flow-circle.first{background:linear-gradient(135deg,${c},${dk(c,10)});color:#fff;box-shadow:0 8px 24px ${ca(c,.3)}}
.flow-circle.rest{background:#fff;color:${c};border:2px solid #ece8e1}
.flow-step-name{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.flow-step-desc{font-size:11px;color:#999;line-height:1.8;white-space:pre-line}

/* ── Pricing ── */
.price-card{background:#fff;border-radius:28px;padding:56px 44px;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,.07);border:1px solid #ece8e1;position:relative;overflow:hidden;max-width:480px;margin:0 auto}
.price-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,${c},${g},${c})}
.price-ribbon{position:absolute;top:24px;right:-36px;background:${ctaC};color:#fff;padding:6px 48px;font-size:11px;font-weight:700;transform:rotate(45deg);letter-spacing:1px;box-shadow:0 2px 8px ${ca(ctaC,.3)}}
.price-cta-btn{display:block;width:100%;padding:20px;background:${ctaC};color:#fff;border:none;border-radius:16px;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:2px;font-family:'Noto Sans JP',sans-serif;box-shadow:0 8px 28px ${ca(ctaC,.3)};animation:glowPulse 3s infinite;position:relative;overflow:hidden;transition:all .3s}
.price-cta-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmerBtn 2.5s infinite}
.price-cta-btn:hover{transform:translateY(-2px)}
.tick-item{display:flex;align-items:center;gap:14px;padding:12px 0;font-size:14px;color:#555;border-bottom:1px solid #f5f0ea}
.tick-item:last-child{border-bottom:none}

/* ── FAQ ── */
.faq-item{margin-bottom:14px;border:1px solid #ece8e1;border-radius:16px;overflow:hidden;background:#fff;transition:all .3s}
.faq-item.open{border-color:${ca(c,.3)};box-shadow:0 4px 20px ${ca(c,.06)}}
.faq-q{padding:22px 28px;font-size:15px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:16px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Noto Sans JP',sans-serif}
.faq-q:hover{color:${c}}
.faq-badge{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-family:'Inter',sans-serif;font-size:13px;font-weight:800;flex-shrink:0}
.faq-chev{flex-shrink:0;margin-left:auto;transition:transform .35s;width:14px;height:14px}
.faq-item.open .faq-chev{transform:rotate(180deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.faq-a-inner{padding:0 28px 24px 76px;font-size:14px;color:#777;line-height:2.1;display:flex;gap:12px}

/* ── Final CTA ── */
.final-cta{position:relative;overflow:hidden;min-height:70vh;display:flex;align-items:center;justify-content:center}
.final-cta-bg{position:absolute;inset:0;background-size:cover;background-position:center}

.final-urgency{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:30px;padding:8px 24px;font-size:12px;color:${g};font-weight:600;letter-spacing:2px;margin-bottom:28px}
.final-h{font-family:'Noto Serif JP',serif;font-size:34px;font-weight:700;color:#fff;line-height:1.6;margin-bottom:16px;letter-spacing:4px}
.final-sub{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:40px;letter-spacing:1.5px}
.final-cta-btn{display:inline-block;padding:22px 60px;background:#fff;color:${c};border-radius:60px;font-size:18px;font-weight:700;text-decoration:none;box-shadow:0 8px 40px rgba(0,0,0,.25);transition:all .35s;cursor:pointer;border:none;letter-spacing:2px;font-family:'Noto Sans JP',sans-serif}
.final-cta-btn:hover{transform:translateY(-3px) scale(1.02)}
.final-line-btn{display:inline-block;padding:18px 48px;background:#06C755;color:#fff;border-radius:60px;font-size:16px;font-weight:700;margin-left:16px;cursor:pointer;border:none;letter-spacing:1px;font-family:'Noto Sans JP',sans-serif;box-shadow:0 8px 24px rgba(6,199,85,.3);transition:all .3s}
.final-line-btn:hover{transform:translateY(-3px)}

/* ── Footer ── */
.lp-footer{padding:48px 24px 28px;background:#111;color:#888;text-align:center}
.footer-brand{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:4px}
.footer-line{width:36px;height:1px;background:${g};margin:12px auto;opacity:.5}
.footer-info{font-size:11px;line-height:2.2;margin-bottom:20px;color:#555}
.footer-links{display:flex;justify-content:center;gap:28px;font-size:11px;margin-bottom:24px;color:#444}

.footer-copy{font-size:10px;color:#333;padding-top:16px;border-top:1px solid #1a1a1a;letter-spacing:1px}

/* ── Floating ── */
.float-line{position:fixed;bottom:24px;right:24px;z-index:9990;background:#06C755;color:#fff;border:none;border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(6,199,85,.35);transition:all .3s}

.back-top{position:fixed;bottom:24px;right:90px;z-index:9990;background:rgba(26,26,26,.8);color:#fff;border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(10px);transition:all .3s}

.orn-frame::after{bottom:0;right:0;border-width:0 1px 1px 0}

<script>
// Sticky nav
const nav=document.getElementById('lp-nav');
const btt=document.getElementById('btt');
window.addEventListener('scroll',()=>{
const y=window.scrollY;
nav.classList.toggle('scrolled',y>80);
btt.classList.toggle('show',y>600);
},{passive:true});

// IntersectionObserver
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}});
},{threshold:.15,rootMargin:'0px 0px -40px 0px'});
document.querySelectorAll('.anim-target').forEach(el=>obs.observe(el));

// Counter
const sObs=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting){
e.target.querySelectorAll('.stat-num').forEach(el=>{
const raw=el.getAttribute('data-target');
const isNeg=raw.startsWith('-');
const target=parseFloat(raw.replace('-',''));
const hasDec=raw.includes('.');
const dur=1200,start=performance.now();
const anim=now=>{
const p=Math.min((now-start)/dur,1);
const eased=1-Math.pow(1-p,3);
let val=target*eased;
val=hasDec?val.toFixed(1):Math.floor(val);
let d=Number(val).toLocaleString();
if(isNeg)d='-'+d;
el.textContent=d;
if(p<1)requestAnimationFrame(anim);
};requestAnimationFrame(anim);
});sObs.unobserve(e.target)}});
},{threshold:.3});
const ss=document.querySelector('.stats');
if(ss)sObs.observe(ss);

// FAQ
function toggleFaq(btn){
const item=btn.closest('.faq-item');
const ans=item.querySelector('.faq-a');
const isOpen=item.classList.contains('open');
document.querySelectorAll('.faq-item.open').forEach(fi=>{fi.classList.remove('open');fi.querySelector('.faq-a').style.maxHeight='0'});
if(!isOpen){item.classList.add('open');ans.style.maxHeight=ans.scrollHeight+'px'}
}
<\/script>`;

},2500);
}
</script>
